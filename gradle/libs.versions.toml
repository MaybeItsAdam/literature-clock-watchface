[versions]
agp = "8.9.1"
kotlin = "2.0.21"
playServicesWearable = "18.0.0"
watchfaceComplicationsDataSource = "1.2.1"
coroutines = "1.8.1"

[libraries]
play-services-wearable = { group = "com.google.android.gms", name = "play-services-wearable", version.ref = "playServicesWearable" }
watchface = { group = "androidx.wear.watchface", name = "watchface", version.ref = "watchfaceComplicationsDataSource" }
watchface-complications-data-source = { group = "androidx.wear.watchface", name = "watchface-complications-data-source", version.ref = "watchfaceComplicationsDataSource" }
watchface-complications-data-source-ktx = { group = "androidx.wear.watchface", name = "watchface-complications-data-source-ktx", version.ref = "watchfaceComplicationsDataSource" }
watchface-editor = { group = "androidx.wear.watchface", name = "watchface-editor", version.ref = "watchfaceComplicationsDataSource" }
kotlinx-coroutines-android = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-android", version.ref = "coroutines" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
